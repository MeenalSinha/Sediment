name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sediment
          POSTGRES_PASSWORD: sediment
          POSTGRES_DB: sediment
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U sediment"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install --workspaces --if-present --include-workspace-root

      - name: Lint
        run: npm run lint

      - name: Build all packages
        run: npm run build
        env:
          DATABASE_URL: postgresql://sediment:sediment@localhost:5432/sediment
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-secret
          SESSION_SECRET: ci-test-secret

      - name: Run tests
        run: npm test
        env:
          DATABASE_URL: postgresql://sediment:sediment@localhost:5432/sediment
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-secret
          SESSION_SECRET: ci-test-secret
