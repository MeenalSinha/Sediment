<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sediment — Uncover. Restore. Remember.</title>
    <style>
      html, body, #root { height: 100%; margin: 0; padding: 0; }
      body { background: #080a0c; color: #f4ead2; font-family: system-ui, sans-serif; }
      #boot-screen {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        height: 100vh; gap: 16px; text-align: center;
      }
      #boot-title { font-size: 2rem; font-weight: bold; color: #f2d385; letter-spacing: 0.2em; }
      #boot-msg { font-size: 0.85rem; color: #c7a863; }
      #error-box {
        display: none; background: #1a0000; border: 2px solid #ff4444; border-radius: 8px;
        padding: 16px; max-width: 90vw; text-align: left; font-size: 12px; color: #ff8888;
        white-space: pre-wrap; word-break: break-all;
      }
    </style>
    <script>
      window.onerror = function(msg, src, line, col, err) {
        document.getElementById('boot-msg').textContent = 'Error: ' + msg;
        var box = document.getElementById('error-box');
        box.style.display = 'block';
        box.textContent = (err ? err.stack : '') || (msg + ' @ ' + src + ':' + line);
        return false;
      };
      window.addEventListener('unhandledrejection', function(e) {
        document.getElementById('boot-msg').textContent = 'Promise error';
        var box = document.getElementById('error-box');
        box.style.display = 'block';
        box.textContent = String(e.reason && e.reason.stack ? e.reason.stack : e.reason);
      });
    </script>
    <script type="module" crossorigin src="./assets/index-C4I4FXso.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-DfyEmXq4.css">
  </head>
  <body>
    <div id="boot-screen">
      <div id="boot-title">🏺 SEDIMENT</div>
      <div id="boot-msg">Initialising…</div>
      <div id="error-box"></div>
    </div>
    <div id="root"></div>
  </body>
</html>
