version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: sediment
      POSTGRES_PASSWORD: sediment
      POSTGRES_DB: sediment
    ports:
      - "5433:5432"
    volumes:
      - sediment_pg_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/2-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sediment"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://sediment:sediment@postgres:5432/sediment
      REDIS_URL: redis://redis:6379
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:4000
        VITE_SOCKET_URL: http://localhost:4000
        VITE_REDDIT_LOGIN_URL: http://localhost:4000/api/auth/reddit/login
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  sediment_pg_data:
